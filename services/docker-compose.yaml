name: dasi
x-app-service: &app-service
  restart: unless-stopped
  init: true
  networks:
    - dasi-net

services:
  gateway:
    <<: *app-service
    container_name: gateway-service
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    env_file:
      - ./gateway/env/.env.production
    environment:
      NODE_ENV: production
    depends_on:
      - identity
      - analytics
      - rabbitmq
    networks:
      - dasi-net

  identity:
    <<: *app-service
    container_name: identity-service
    build:
      context: ./identity
      dockerfile: Dockerfile
    env_file:
      - ./identity/env/.env.production
    ports:
      - 3001:3001
    environment:
      NODE_ENV: production
    depends_on:
      postgres-identity:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dasi-net

  
  postgres-identity:
    image: postgres:16-alpine
    container_name: postgres-identity
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity
      PGDATA: /var/lib/postgresql/data/pgdata 
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dasi-net
  
  analytics:
    <<: *app-service
    container_name: analytics-service
    build:
      context: ./analytics
      dockerfile: Dockerfile
    env_file:
      - ./analytics/env/.env.production
    ports:
      - 3002:3002
    environment:
      NODE_ENV: production
    depends_on:
      postgres-analytics:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dasi-net

  postgres-analytics:
    image: postgres:16-alpine
    container_name: postgres-analytics
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
      PGDATA: /var/lib/postgresql/data/pgdata 
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dasi-net


  chat:
    <<: *app-service
    container_name: chat-service
    build:
      context: ./chat
      dockerfile: Dockerfile
    env_file:
      - ./chat/env/.env.production
    ports:
      - 3003:3003
    environment:
      NODE_ENV: production
    depends_on:
      postgres-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dasi-net

  postgres-chat:
    image: postgres:16-alpine
    container_name: postgres-chat
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat
      PGDATA: /var/lib/postgresql/data/pgdata 
    volumes:
      - postgres-chat-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dasi-net

  rabbitmq:
    image: rabbitmq
    container_name: rabbitmq
    ports:
      - 5672:5672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - dasi-net

volumes:
  postgres-identity-data:
  postgres-analytics-data:
  postgres-chat-data:
networks:
  dasi-net:
    driver: bridge
