name: Dynamic deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: dasi
  SERVICES_DIR: services
  VM_APP_PATH: /home/alexgrama837/DASI/services

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      services_list: ${{ steps.set-matrix.outputs.services_list }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-matrix
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse HEAD~1)"
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" \
            | awk -F/ '/^services\/[^/]+\// {print $2}' \
            | sort -u)

          VALID_SERVICES=()

          for svc in $CHANGED; do
            if [ -f "services/$svc/Dockerfile" ]; then
              VALID_SERVICES+=("$svc")
            fi
          done

          if [ ${#VALID_SERVICES[@]} -eq 0 ]; then
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'services_list=' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON_ARRAY=$(printf '%s\n' "${VALID_SERVICES[@]}" | jq -R . | jq -s -c .)
          MATRIX=$(jq -cn --argjson arr "$JSON_ARRAY" '{service: $arr}')
          SERVICES_LIST=$(printf '%s ' "${VALID_SERVICES[@]}" | sed 's/[[:space:]]*$//')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "services_list=$SERVICES_LIST" >> "$GITHUB_OUTPUT"

      - name: Show detected services
        run: |
          echo "has_changes=${{ steps.set-matrix.outputs.has_changes }}"
          echo "services_list=${{ steps.set-matrix.outputs.services_list }}"
          echo 'matrix=${{ steps.set-matrix.outputs.matrix }}'

  build-and-push:
    needs: detect-services
    if: needs.detect-services.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:latest \
            ./${{ env.SERVICES_DIR }}/${{ matrix.service }}

      - name: Push image
        run: |
          docker push \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:latest

  deploy:
    needs: [detect-services, build-and-push]
    if: needs.detect-services.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy changed services on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            
            cd /home/alexgrama837/DASI
            git fetch origin
            git checkout main
            git pull origin main
            
            cd ${{ env.VM_APP_PATH }}
            
            CHANGED_SERVICES="${{ needs.detect-services.outputs.services_list }}"
            echo "Deploying services to production: $CHANGED_SERVICES"
            
            docker compose -f docker-compose.prod.yaml pull $CHANGED_SERVICES
            docker compose -f docker-compose.prod.yaml up -d --force-recreate --no-deps $CHANGED_SERVICES
            docker image prune -f
