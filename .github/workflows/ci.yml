name: CI

on:
  pull_request:
    branches:
      - development

permissions:
  contents: read

env:
  SERVICES_DIR: services

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      services_list: ${{ steps.set-matrix.outputs.services_list }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-matrix
        shell: bash
        run: |
          set -e

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" \
            | awk -F/ '/^services\/[^/]+\// {print $2}' \
            | sort -u)

          VALID_SERVICES=()

          for svc in $CHANGED; do
            if [ -f "services/$svc/Dockerfile" ]; then
              VALID_SERVICES+=("$svc")
            fi
          done

          if [ ${#VALID_SERVICES[@]} -eq 0 ]; then
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'services_list=' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON_ARRAY=$(printf '%s\n' "${VALID_SERVICES[@]}" | jq -R . | jq -s -c .)
          MATRIX=$(jq -cn --argjson arr "$JSON_ARRAY" '{service: $arr}')
          SERVICES_LIST=$(printf '%s ' "${VALID_SERVICES[@]}" | sed 's/[[:space:]]*$//')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "services_list=$SERVICES_LIST" >> "$GITHUB_OUTPUT"

      - name: Show detected services
        run: |
          echo "has_changes=${{ steps.set-matrix.outputs.has_changes }}"
          echo "services_list=${{ steps.set-matrix.outputs.services_list }}"
          echo 'matrix=${{ steps.set-matrix.outputs.matrix }}'

  build-check:
    needs: detect-services
    if: needs.detect-services.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build changed service
        run: |
          docker build \
            -t local/${{ matrix.service }}:ci-check \
            ./${{ env.SERVICES_DIR }}/${{ matrix.service }}

  unit-tests:
    needs: detect-services
    if: needs.detect-services.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (npm services)
        if: matrix.service != 'client'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Setup pnpm (client)
        if: matrix.service == 'client'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node (client)
        if: matrix.service == 'client'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: services/client/pnpm-lock.yaml

      - name: Install dependencies and run unit tests
        working-directory: services/${{ matrix.service }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.service }}" = "client" ]; then
            pnpm install --frozen-lockfile
            pnpm run --if-present test -- --passWithNoTests
          else
            npm ci
            npm run test --if-present -- --passWithNoTests
          fi